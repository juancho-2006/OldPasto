################
### MONITORS ###
################

# Detección automática de resolución
monitor=,preferred,auto,auto

# Puedes forzar escala si quieres (ejemplo: 1.25)

#monitor=,preferred,auto,1.40

###################
### MY PROGRAMS ###
###################

$menu = wofi --show drun
$terminal = kitty
#################
### AUTOSTART ###
#################

# Fondo con Hyprpaper
exec-once = hyprpaper &
exec-once = ~/scripts/cambiar_fondos.sh &

# Notificaciones (opcional)
exec-once = mako &

exec-once = openrgb &&
# Barra (opcional)
exec-once = waybar &
exec-once = hypridle &
 
# exec-once = alttabway daemon 

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_WEBRENDER,1


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 7
    border_size = 0
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 23
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.8

    shadow {
        enabled = true
        range = 15
        render_power = 4
        color = rgba(00000055)
    }

    blur {
        enabled = true
        size = 3
        passes = 2
	vibrancy = 0.15
    }
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    animation = windows, 1, 3, easeOutQuint
    animation = fade, 1, 2.5, easeOutQuint
    animation = workspaces, 1, 1.9, easeOutQuint, fade
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = false
}


#############
### INPUT ###
#############

input {
    kb_layout = latam
    kb_options = caps:super
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}


###################
### KEYBINDINGS ###
###################

$mainMod = ALT

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive
bind = $mainMod, M, exit
bind = ALT SHIFT, M, exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, w, exec, $menu
bind = $mainMod, V, togglefloating
bind = $mainMod, J, togglesplit
bind = $mainMod, P, exec, systemctl hibernate
bind = $mainMod, C, exec, ~/scripts/cafe.sh
bind = ALT, TAB, exec, alttabway show --next
bind = ALT SHIFT, TAB, exec, alttabway show --previous
bind = $mainMod SHIFT, C, exec, grim -g "$(slurp)" - | wl-copy
# Movimiento del foco
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# mostrar/ocultar scratchpad
bind = $mainMod, S, togglespecialworkspace, scratch
# enviar ventana activa al scratchpad
bind = SUPER, SPACE, togglefloating
bind = $mainMod SHIFT, S, movetoworkspace, special:scratch
bind=CTRL_SHIFT, F1, exec, chvt 1
bind=CTRL_SHIFT, F2, exec, chvt 2
bind=CTRL_SHIFT, F3, exec, chvt 3
bind=CTRL_SHIFT, F4, exec, chvt 4


# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8

# Mover ventana al workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, U, exec, ~/.config/hypr/uxplay-float.sh

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volumen y brillo
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# Control de brillo con F7 / F8
bind = , F7, exec, brightnessctl set 10%-
bind = , F8, exec, brightnessctl set +10%



##############################
### WINDOWS AND WORKSPACES ###
##############################

